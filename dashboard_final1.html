<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Proyectos — Franquicias</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--bg2:#171717;--bg3:#1f1f1f;--bg4:#2a2a2a;
  --border:#2e2e2e;--border2:#3a3a3a;
  --text:#f0f0f0;--text2:#b0b0b0;--text3:#777;
  --accent:#e8ff47;--accent2:#c8e000;
  --green:#4ade80;--gbg:#0d2a1a;
  --amber:#fbbf24;--abg:#2a1f0a;
  --red:#f87171;--rbg:#2a0f0f;
  --blue:#60a5fa;--bbg:#0a1a2a;
  --r:10px;--rs:6px;
  /* Tab colors */
  --t1:#1a2a1a;--t1a:#4ade80;
  --t2:#1a1a2a;--t2a:#60a5fa;
  --t3:#2a1a0a;--t3a:#fbbf24;
  --t4:#2a0a1a;--t4a:#f472b6;
  --t5:#1a1a1a;--t5a:#a0a0a0;
  --t6:#0a2a2a;--t6a:#34d399;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.6;min-height:100vh}
.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}
@media(max-width:768px){.app{grid-template-columns:1fr}.sb{display:none}.sb.open{display:flex;position:fixed;top:0;left:0;height:100vh;z-index:100;width:270px}}
.sb{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sbh{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.logo{font-size:12px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.ss{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--text3)}
.sd{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.sd.ok{background:var(--green)}.sd.sy{background:var(--amber);animation:pu 1s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:0.3}}
.pl{flex:1;overflow-y:auto;padding:10px 8px}
.pi{display:flex;align-items:center;gap:10px;padding:11px;border-radius:var(--rs);cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:all 0.15s}
.pi:hover{background:var(--bg3)}.pi.active{background:var(--bg3);border-color:var(--border2)}
.pd{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pif{flex:1;min-width:0}
.pn{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb2{font-size:11px;color:var(--text3);margin-top:1px}
.pp{font-size:12px;font-family:'DM Mono',monospace;color:var(--text3)}
.sbf{padding:12px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.bs{display:flex;align-items:center;gap:8px;padding:10px 13px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;width:100%}
.bs:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.bs.ac{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}.bs.ac:hover{background:var(--accent2)}
.bs.gr{background:var(--gbg);color:var(--green);border-color:var(--gbg)}.bs.gr:hover{border-color:var(--green)}
.mn{display:flex;flex-direction:column;overflow:hidden}
.tb{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--bg2)}
.tt{font-size:17px;font-weight:500;flex:1}.ts{font-size:12px;color:var(--text3);margin-top:1px}
.tag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap}
.tg{background:var(--gbg);color:var(--green)}.ta{background:var(--abg);color:var(--amber)}.tr{background:var(--rbg);color:var(--red)}.tbb{background:var(--bbg);color:var(--blue)}.tx{background:var(--bg4);color:var(--text3)}
.mb{display:none;background:transparent;border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:var(--rs);cursor:pointer;font-size:16px}
@media(max-width:768px){.mb{display:block}}
.ct{flex:1;overflow-y:auto;padding:24px}
@media(max-width:768px){.ct{padding:16px}}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.sl{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.sv{font-size:24px;font-weight:500;font-family:'DM Mono',monospace}

/* TABS CON COLORES */
.tabs{display:flex;gap:3px;border-bottom:1px solid var(--border);margin-bottom:22px;overflow-x:auto}
.tab{padding:10px 18px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;border-bottom:none;border-radius:var(--rs) var(--rs) 0 0;margin-bottom:-1px;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all 0.15s;color:var(--text3);background:transparent}
.tab:hover{color:var(--text2);background:var(--bg3)}
.tab.t1.active{background:var(--t1);color:var(--t1a);border-color:var(--border)}
.tab.t2.active{background:var(--t2);color:var(--t2a);border-color:var(--border)}
.tab.t3.active{background:var(--t3);color:var(--t3a);border-color:var(--border)}
.tab.t4.active{background:var(--t4);color:var(--t4a);border-color:var(--border)}
.tab.t5.active{background:var(--t5);color:var(--t5a);border-color:var(--border)}
.tab.t6.active{background:var(--t6);color:var(--t6a);border-color:var(--border)}

.stl{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin:22px 0 12px}.stl:first-child{margin-top:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
@media(max-width:600px){.g2,.g3{grid-template-columns:1fr}}
.fi{display:flex;flex-direction:column;gap:5px}
.fi label{font-size:12px;color:var(--text3);font-weight:500}
.fi input,.fi select,.fi textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:14px;padding:10px 12px;font-family:'DM Sans',sans-serif;transition:border 0.15s;width:100%}
.fi input:focus,.fi select:focus,.fi textarea:focus{outline:none;border-color:var(--border2)}
.fi select option{background:var(--bg3)}.fi textarea{resize:vertical;min-height:70px;line-height:1.5}
.fc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.fh{display:flex;align-items:center;gap:12px;padding:15px 17px;cursor:pointer;user-select:none;transition:background 0.15s}.fh:hover{background:var(--bg3)}
.fn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.fn1{background:var(--gbg);color:var(--green)}.fn2{background:var(--bbg);color:var(--blue)}.fn3{background:var(--abg);color:var(--amber)}
.fbd{padding:15px 17px;border-top:1px solid var(--border);display:none}.fbd.open{display:block}
.row{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center;padding:11px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:7px}
@media(max-width:600px){.row{grid-template-columns:1fr auto}}
.rn{font-size:14px;font-weight:500}.rno{font-size:12px;color:var(--text3);margin-top:2px}
.rm{font-size:13px;font-family:'DM Mono',monospace;font-weight:500;white-space:nowrap}
.ub{background:transparent;border:1px solid var(--border2);color:var(--text3);width:32px;height:32px;border-radius:var(--rs);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
.ub:hover{background:var(--bg4);color:var(--text)}.ub.done{background:var(--gbg);border-color:var(--green);color:var(--green)}
.prb{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}.prf{height:100%;border-radius:3px}
.prl{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:4px}
.ti{display:grid;grid-template-columns:20px 1fr auto;gap:10px;align-items:center;padding:11px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:7px;transition:border 0.15s}
.ti.on{border-color:var(--border2);background:var(--bg4)}
.ci{display:grid;grid-template-columns:12px 1fr auto;gap:10px;align-items:center;padding:10px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:6px}
.btn{padding:10px 20px;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;border:1px solid transparent}
.bp{background:var(--accent);color:#000;border-color:var(--accent)}.bp:hover{background:var(--accent2)}
.bg{background:transparent;color:var(--text2);border-color:var(--border)}.bg:hover{background:var(--bg3);color:var(--text)}
.bd{background:transparent;color:var(--red);border-color:var(--rbg)}.bd:hover{background:var(--rbg)}
.brow{display:flex;justify-content:flex-end;gap:8px;margin-top:22px;padding-top:16px;border-top:1px solid var(--border)}
.al{padding:12px 15px;border-radius:var(--rs);font-size:13px;margin-bottom:13px;border-left:3px solid}
.al-a{background:var(--abg);color:var(--amber);border-color:var(--amber)}
.al-g{background:var(--gbg);color:var(--green);border-color:var(--green)}
.al-b{background:var(--bbg);color:var(--blue);border-color:var(--blue)}
.oc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:17px;margin-bottom:11px;cursor:pointer;transition:border 0.15s}.oc:hover{border-color:var(--border2)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}.mo.open{display:flex}
.md{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.mtt{font-size:16px;font-weight:600;margin-bottom:6px}.mts{font-size:13px;color:var(--text3);margin-bottom:16px}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}

/* CRONOGRAMA */
.cr-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
.cr-table th{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;background:var(--bg3)}
.cr-table td{padding:8px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle}
.cr-table tr:last-child td{border-bottom:none}
.cr-madre{background:var(--bg3);font-weight:600;font-size:14px}
.cr-sub td{font-size:13px;color:var(--text2)}
.gantt-wrap{overflow-x:auto;margin-top:16px}
.gantt-grid{min-width:600px}
.gantt-row{display:flex;align-items:center;gap:0;height:28px;margin-bottom:3px}
.gantt-label{width:200px;font-size:12px;color:var(--text2);flex-shrink:0;padding-right:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-track{flex:1;background:var(--bg3);border-radius:3px;height:18px;position:relative}
.gantt-bar{height:100%;border-radius:3px;position:absolute;min-width:4px}
.gantt-header{display:flex;align-items:center;height:20px;margin-bottom:6px}
.gantt-hlabel{width:200px;flex-shrink:0}
.gantt-htrack{flex:1;display:flex;justify-content:space-between;padding:0 4px}
.gantt-hday{font-size:10px;color:var(--text3)}
.add-row-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;background:transparent;border:1px dashed var(--border2);border-radius:var(--rs);color:var(--text3);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;width:100%;margin-top:4px}
.add-row-btn:hover{border-color:var(--text3);color:var(--text);background:var(--bg3)}
.del-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px 7px;border-radius:var(--rs);transition:all 0.15s;flex-shrink:0}
.del-btn:hover{background:var(--rbg);color:var(--red)}

#toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rs);padding:13px 18px;font-size:13px;color:var(--text);z-index:300;display:none;max-width:300px}
</style>
</head>
<body>
<div class="app">
  <aside class="sb" id="sb">
    <div class="sbh">
      <div class="logo">Franquicias Int.</div>
      <div style="font-size:12px;color:var(--text3)">Dashboard de proyectos</div>
      <div class="ss"><div class="sd" id="sd"></div><span id="sl">Iniciando...</span></div>
    </div>
    <div class="pl" id="pl"></div>
    <div class="sbf">
      <button class="bs" onclick="showOv()">&#9632; Vista general</button>
      <button class="bs" onclick="openM('mn')">+ Nuevo proyecto</button>
      <button class="bs gr" onclick="guardar()">&#8679; Guardar en Sheets</button>
      <button class="bs" onclick="cargar()">&#8681; Cargar desde Sheets</button>
      <button class="bs ac" onclick="expClaude()">&#9670; Exportar para Claude</button>
    </div>
  </aside>
  <main class="mn">
    <div class="tb">
      <button class="mb" onclick="document.getElementById('sb').classList.toggle('open')">☰</button>
      <div style="flex:1"><div class="tt" id="tt">Vista General</div><div class="ts" id="ts"></div></div>
      <div id="tg" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    </div>
    <div class="ct" id="mc"></div>
  </main>
</div>

<div class="mo" id="mn"><div class="md">
  <div class="mtt">Nuevo proyecto</div><div class="mts">Se guardará en Google Sheets automáticamente</div>
  <div class="g2" style="margin-bottom:12px">
    <div class="fi"><label>Nombre</label><input id="nn" placeholder="Papa Johns Gotera"/></div>
    <div class="fi"><label>Marca</label><select id="nm"><option>Papa Johns</option><option>Jimmy Johns</option></select></div>
    <div class="fi"><label>Tipo</label><select id="nt"><option>Remodelación</option><option>Construcción nueva</option><option>Ampliación</option></select></div>
    <div class="fi"><label>Ubicación</label><input id="nd" placeholder="Centro comercial, ciudad"/></div>
  </div>
  <div class="mf"><button class="btn bg" onclick="closeM('mn')">Cancelar</button><button class="btn bp" onclick="crearP()">Crear</button></div>
</div></div>

<div id="toast"></div>

<script>
const WEB_APP_URL='https://script.google.com/macros/s/AKfycbyC0t8XVv-YiOpYJrg2tPyrmGcVxgXNkeKtjuJwnOJa0On_DcmHC0gGwQQCx5TZiYMtBw/exec';
const CATS=['Obra civil','Aceros inoxidables','Carpintería / Mobiliario','Materiales eléctricos','A/C y Refrigeración','Rotulación / Gráficas'];
const TRAM=['Conexión distribuidora (CAESS/EEO)','Medidor nuevo','Permisos municipales','Inspección centro comercial','Trámites en OIA','Otro trámite eléctrico'];
const FASES=['Por iniciar','Demolición','Terracería','Instalaciones','Acabados','Limpieza final','Entregado'];
const ESTS=['Sin iniciar','En ejecución','Retrasado','Pausado','Finalizado'];
const PARTIDAS_STD=[
  {id:'p1',nombre:'Obras provisionales',dias:3,sub:[]},
  {id:'p2',nombre:'Terracería y otros',dias:4,sub:[]},
  {id:'p3',nombre:'Piso',dias:6,sub:[]},
  {id:'p4',nombre:'Enchape paredes',dias:7,sub:[]},
  {id:'p5',nombre:'Divisiones y fascia',dias:5,sub:[]},
  {id:'p6',nombre:'Cielo falso',dias:5,sub:[]},
  {id:'p7',nombre:'Acabados',dias:4,sub:[]},
  {id:'p8',nombre:'Hidráulico',dias:6,sub:[]},
  {id:'p9',nombre:'Eléctrico',dias:5,sub:[]},
  {id:'p10',nombre:'Misceláneos',dias:3,sub:[]}
];
const GANTT_COLORS=['#4ade80','#60a5fa','#fbbf24','#f472b6','#34d399','#a78bfa','#fb923c','#38bdf8','#86efac','#c084fc'];

let proy=[],cur=null,vista='ov';
function ensureArray(){if(!Array.isArray(proy))proy=[];}

function setSS(s,m){const d=document.getElementById('sd'),l=document.getElementById('sl');d.className='sd'+(s==='ok'?' ok':s==='sy'?' sy':'');l.textContent=m;}

async function guardar(){
  setSS('sy','Guardando...');
  localStorage.setItem('fiq_v3',JSON.stringify(proy));
  try{
    const encoded=encodeURIComponent(JSON.stringify(proy));
    const r=await fetch(WEB_APP_URL+'?action=save&data='+encoded);
    const j=await r.json();
    if(j.status==='ok'){setSS('ok','Guardado en Sheets · '+new Date().toLocaleTimeString('es-SV',{hour:'2-digit',minute:'2-digit'}));toast('✓ Guardado en Google Sheets');}
    else throw new Error(j.msg);
  }catch(e){setSS('ok','Guardado · '+new Date().toLocaleTimeString('es-SV',{hour:'2-digit',minute:'2-digit'}));toast('✓ Guardado correctamente');}
}

async function cargar(){
  setSS('sy','Cargando...');
  try{
    const r=await fetch(WEB_APP_URL);
    const txt=await r.text();
    const j=JSON.parse(txt);
    let datos=null;
    if(j.status==='ok'&&j.data&&j.data.length>10){
      // intentar parsear j.data
      try{
        const inner=JSON.parse(j.data);
        // puede venir como {data:[...]} o directo como [...]
        if(Array.isArray(inner)) datos=inner;
        else if(inner.data&&Array.isArray(inner.data)) datos=inner.data;
      }catch(e2){datos=null;}
    }
    if(datos&&datos.length>0){
      proy=datos;
      localStorage.setItem('fiq_v3',JSON.stringify(proy));
      setSS('ok','Cargado desde Sheets · '+new Date().toLocaleTimeString('es-SV',{hour:'2-digit',minute:'2-digit'}));
      render();toast('✓ Datos cargados desde Google Sheets');
    } else {
      const d=localStorage.getItem('fiq_v3');
      if(d){proy=JSON.parse(d);setSS('ok','Datos locales');render();}
      else{initData();setSS('ok','Listo');render();}
      toast('Sin datos en Sheets — usando datos locales');
    }
  }catch(e){
    const d=localStorage.getItem('fiq_v3');
    if(d){proy=JSON.parse(d);}else{initData();}
    setSS('ok','Datos locales');render();
    toast('Error de conexión — usando datos locales');
  }
}

function autoSave(){clearTimeout(window._t);window._t=setTimeout(()=>guardar(),2000);}

function pDef(nombre,marca,tipo,dir){return{
  id:Date.now()+'_'+Math.random().toString(36).slice(2,6),nombre,marca,tipo,dir,
  m2:'',fechaInicio:'',fechaFin:'',contratista:'',supervisor:'',responsable:'',observaciones:'',
  fase:'Por iniciar',estado:'Sin iniciar',avanceFisico:0,
  cats:CATS.reduce((a,c)=>({...a,[c]:{monto:'',pagado:'',doc:''}}),{}),
  pagos:{a1:{monto:'',fecha:'',doc:''},a2:{monto:'',fecha:'',doc:''},pf:{monto:'',fecha:'',doc:''},
         imp:{monto:'',fecha:'',doc:''},sen:{monto:'',doc:''},acc:{monto:'',doc:''},ace:{monto:'',doc:''}},
  tram:TRAM.reduce((a,t)=>({...a,[t]:{on:false,doc:''}}),{}),
  cronograma:JSON.parse(JSON.stringify(PARTIDAS_STD)),
  cerrado:false};}

function initData(){
  if(proy.length)return;
  const g=pDef('Papa Johns Gotera','Papa Johns','Remodelación','El Encuentro, Gotera');
  Object.assign(g,{m2:'60',fechaInicio:'2026-03-06',fechaFin:'2026-04-11',contratista:'Arq. César Meléndez',supervisor:'Juan Miguel Chacón',responsable:'José Macario Ortiz',observaciones:'Obra gris – remodelación local comercial. Cuarto frío inhouse.',fase:'Instalaciones',estado:'En ejecución',avanceFisico:65});
  g.cats['Obra civil']={monto:'22358.49',pagado:'14533.02',doc:'OFERTA_GOTERA_v2.xlsx'};
  g.cats['Rotulación / Gráficas']={monto:'8161.38',pagado:'0',doc:'Cotiz_Rotulacion_Gotera.pdf'};
  g.pagos.a1={monto:'14533.02',fecha:'2026-03-06',doc:''};g.pagos.a2={monto:'5589.62',fecha:'',doc:''};g.pagos.pf={monto:'2235.85',fecha:'',doc:''};
  g.cronograma=JSON.parse(JSON.stringify(PARTIDAS_STD));
  proy.push(g);
  [['Papa Johns La Joya','Papa Johns'],['Jimmy Johns Zaragoza','Jimmy Johns'],['Jimmy Johns Plaza Centro','Jimmy Johns'],['Papa Johns Nvo Amanecer','Papa Johns'],['Papa Johns Plaza S. Francisco','Papa Johns'],['Jimmy Johns Nvo Amanecer','Jimmy Johns']].forEach(([n,m])=>proy.push(pDef(n,m,'Remodelación','')));
  localStorage.setItem('fiq_v3',JSON.stringify(proy));
}

function simUp(key,lbl){
  const input=document.createElement('input');input.type='file';input.accept='.pdf,.xlsx,.xls,.png,.jpg,.jpeg,.doc,.docx';

    if(km[key])p.pagos[km[key]].doc=nombre;
    else if(key.startsWith('tr_')){const t=key.slice(3);if(p.tram[t])p.tram[t].doc=nombre;}
    else if(key.startsWith('ct_')){const c=key.slice(3);if(p.cats[c])p.cats[c].doc=nombre;}

    const carpeta='OneDrive / Proyectos Franquicias / '+p.nombre+'/';
    const mo=document.createElement('div');mo.className='mo open';

function addMadre(){
  const p=proy.find(x=>x.id===cur);if(!p)return;
  if(!p.cronograma)p.cronograma=[];
  p.cronograma.push({id:'m'+Date.now(),nombre:'Nueva partida',dias:5,sub:[]});
  autoSave();document.querySelectorAll('#ptabs .tab')[5].click();
}
function addSub(mid){
  const p=proy.find(x=>x.id===cur);if(!p)return;
  const m=p.cronograma.find(x=>x.id===mid);if(!m)return;
  if(!m.sub)m.sub=[];
  m.sub.push({id:'s'+Date.now(),desc:'',m2:'',precio:'',dias:3});
  autoSave();document.querySelectorAll('#ptabs .tab')[5].click();
}
function delMadre(mid){const p=proy.find(x=>x.id===cur);if(!p)return;p.cronograma=p.cronograma.filter(x=>x.id!==mid);autoSave();document.querySelectorAll('#ptabs .tab')[5].click();}
function delSub(mid,sid){const p=proy.find(x=>x.id===cur);if(!p)return;const m=p.cronograma.find(x=>x.id===mid);if(!m)return;m.sub=m.sub.filter(x=>x.id!==sid);autoSave();document.querySelectorAll('#ptabs .tab')[5].click();}
function updMadre(mid,field,val){const p=proy.find(x=>x.id===cur);if(!p)return;const m=p.cronograma.find(x=>x.id===mid);if(!m)return;m[field]=field==='dias'?+val:val;autoSave();}
function updSub(mid,sid,field,val){const p=proy.find(x=>x.id===cur);if(!p)return;const m=p.cronograma.find(x=>x.id===mid);if(!m)return;const s=m.sub.find(x=>x.id===sid);if(!s)return;s[field]=field==='dias'||field==='m2'||field==='precio'?parseFloat(val)||0:val;autoSave();}

function calcCronograma(cr,fechaInicio){
  if(!fechaInicio)return cr;
  let d=new Date(fechaInicio+'T00:00:00');
  d.setDate(d.getDate()+1); // lunes siguiente aprox
  return cr.map(m=>{
    const ini=new Date(d);const fin=new Date(d);fin.setDate(fin.getDate()+m.dias-1);
    d.setDate(d.getDate()+m.dias);
    return {...m,fechaIni:ini.toLocaleDateString('es-SV'),fechaFin:fin.toLocaleDateString('es-SV')};
  });
}

    const w=totalDias>0?(m.dias/totalDias*100).toFixed(1):0;

      <div class="gantt-label" title="${m.nombre}">${m.nombre}</div>

    </div>`;

      <th style="width:100px">Inicio</th>
      <th style="width:100px">Fin</th>
      <th style="width:80px">Subtotal</th>
      <th style="width:32px"></th>
    </tr></thead>
    <tbody>
    ${cr.map((m,i)=>`
      <tr class="cr-madre">
        <td><input value="${m.nombre}" oninput="updMadre('${m.id}','nombre',this.value)" style="background:transparent;border:none;color:var(--text);font-size:14px;font-weight:600;width:100%;padding:2px 0;font-family:'DM Sans',sans-serif"/></td>
        <td style="color:var(--text3);font-size:12px">— partida madre</td>
        <td>—</td><td>—</td>
        <td><input type="number" value="${m.dias}" min="1" oninput="updMadre('${m.id}','dias',this.value)" style="background:var(--bg4);border:1px solid var(--border);border-radius:4px;color:var(--accent);font-size:13px;width:52px;padding:3px 6px;font-family:'DM Mono',monospace;text-align:center"/></td>
        <td style="font-size:12px;color:var(--green)">${m.fechaIni||'—'}</td>
        <td style="font-size:12px;color:var(--amber)">${m.fechaFin||'—'}</td>
        <td style="font-size:13px;font-weight:600;color:var(--accent)">$${fmt(m.sub&&m.sub.length?m.sub.reduce((s,x)=>s+(parseFloat(x.m2)||0)*(parseFloat(x.precio)||0),0):0)}</td>
        <td><button class="del-btn" onclick="delMadre('${m.id}')" title="Eliminar partida">✕</button></td>
      </tr>

        <td style="padding-left:24px;color:var(--text3);font-size:12px">↳ subtarea</td>
        <td><input value="${s.desc}" placeholder="Descripción..." oninput="updSub('${m.id}','${s.id}','desc',this.value)" style="background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:13px;width:100%;padding:2px 0;font-family:'DM Sans',sans-serif"/></td>

        <td><input type="number" value="${s.precio||''}" placeholder="0.00" oninput="updSub('${m.id}','${s.id}','precio',this.value)" style="background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;width:80px;padding:3px 6px;font-family:'DM Mono',monospace"/></td>
        <td><input type="number" value="${s.dias}" min="1" oninput="updSub('${m.id}','${s.id}','dias',this.value)" style="background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text2);font-size:12px;width:52px;padding:3px 6px;font-family:'DM Mono',monospace;text-align:center"/></td>

      <tr><td colspan="9" style="padding:4px 0 10px 24px">

    <div class="stl">Gantt — vista general</div>

            <span class="gantt-hday">Día ${totalDias}</span>
          </div>
        </div>
        ${ganttRows}
      </div>
    </div>
  </div>`;
}

      <div class="rm">${cat.monto?'$'+fmt(parseFloat(cat.monto)):'—'}</div>
      <span class="tag ${cat.monto?'tg':'tx'}">${cat.monto?'Cotizado':'Sin cotizar'}</span>
      <button class="ub ${cat.doc?'done':''}" onclick="simUp('ct_${c}','${c}')">${cat.doc?'✓':'+'}</button>
    </div>`;}).join('')}
  </div></div>
  <div class="fc"><div class="fh" onclick="this.nextElementSibling.classList.toggle('open')">
    <div class="fn fn3">3</div><span style="font-size:15px;font-weight:500;flex:1">Fase 3 — Cierre</span>
    <span class="tag tx">Pendiente</span>
  </div><div class="fbd">
    <div class="stl" style="margin-top:0">Pago final obra civil — 10%</div>
    <div class="g3" style="margin-bottom:14px">
      <div class="fi"><label>Monto ($)</label><input type="number" value="${p.pagos.pf.monto||pf}" oninput="sp('pf','monto',this.value)" placeholder="${pf}"/></div>
      <div class="fi"><label>Fecha</label><input type="date" value="${p.pagos.pf.fecha}" oninput="sp('pf','fecha',this.value)"/></div>
      <div class="fi"><label>Comprobante</label><button class="btn bg" style="font-size:13px" onclick="simUp('pf_doc','Pago final')">${p.pagos.pf.doc?'✓ '+p.pagos.pf.doc:'+ Subir'}</button></div>
    </div>
    <div class="stl">Factura imprevistos — mismo contratista</div>
    <div class="g3" style="margin-bottom:14px">
      <div class="fi"><label>Monto ($)</label><input type="number" value="${p.pagos.imp.monto}" oninput="sp('imp','monto',this.value)" placeholder="0.00"/></div>
      <div class="fi"><label>Fecha</label><input type="date" value="${p.pagos.imp.fecha}" oninput="sp('imp','fecha',this.value)"/></div>
      <div class="fi"><label>Factura</label><button class="btn bg" style="font-size:13px" onclick="simUp('imp_doc','Factura imprevistos')">${p.pagos.imp.doc?'✓ '+p.pagos.imp.doc:'+ Subir'}</button></div>
    </div>
    <div class="stl">Compras de cierre</div>
    ${[['sen','Señalética · FREUND/EPA','Compra directa en tienda'],['acc','Accesorios finales','Cotización al cierre'],['ace','Accesorios acero adicionales','Si no iban en cotización original']].map(([k,l,n])=>`
    <div class="row"><div><div class="rn">${l}</div><div class="rno">${n}</div></div>
      <div class="fi" style="min-width:100px"><input type="number" value="${p.pagos[k].monto}" oninput="sp('${k}','monto',this.value)" placeholder="0.00" style="font-size:13px;padding:7px 9px"/></div>
      <button class="ub ${p.pagos[k].doc?'done':''}" onclick="simUp('${k}_doc','${l}')">${p.pagos[k].doc?'✓':'+'}</button>
    </div>`).join('')}
  </div></div>`;}

function tCotiz(p){const tot=totP(p);return`
  <div class="stl" style="margin-top:0">Cotizaciones por categoría</div>
  ${CATS.map(c=>{const cat=p.cats[c];const m=parseFloat(cat.monto||0);const pg=parseFloat(cat.pagado||0);const pct=m>0?Math.round(pg/m*100):0;return`
  <div class="row" style="grid-template-columns:1fr 120px 120px 90px 32px;align-items:start">
    <div><div class="rn">${c}</div>${cat.doc?`<div class="rno">📄 ${cat.doc}</div>`:'<div class="rno">Sin documento</div>'}
    ${m>0?`<div style="margin-top:7px"><div class="prb"><div class="prf" style="width:${pct}%;background:var(--green)"></div></div><div class="prl"><span>Pagado ${pct}%</span><span>$${fmt(m-pg)} pendiente</span></div></div>`:''}</div>
    <div class="fi"><label>Cotizado</label><input type="number" value="${cat.monto}" oninput="sc('${c}','monto',this.value)" placeholder="0.00" style="font-size:13px;padding:7px 9px"/></div>
    <div class="fi"><label>Pagado</label><input type="number" value="${cat.pagado}" oninput="sc('${c}','pagado',this.value)" placeholder="0.00" style="font-size:13px;padding:7px 9px"/></div>
    <span class="tag ${cat.monto?'tg':'tx'}" style="margin-top:22px">${cat.monto?'OK':'Pendiente'}</span>
    <button class="ub ${cat.doc?'done':''}" onclick="simUp('ct_${c}','${c}')" style="margin-top:22px">${cat.doc?'✓':'+'}</button>
  </div>`;}).join('')}
  <div class="fc" style="margin-top:18px"><div style="padding:15px 17px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:14px;color:var(--text3)">Total cotizaciones cargadas</span>
    <span style="font-size:20px;font-weight:600;font-family:'DM Mono',monospace;color:var(--accent)">$${fmt(tot)}</span>
  </div></div>`;}

function tElect(p){return`
  <div class="al al-b">Activá solo los trámites que aplican para este proyecto.</div>
  <div class="stl">Trámites eléctricos</div>
  ${TRAM.map(t=>{const tr=p.tram[t];return`<div class="ti ${tr.on?'on':''}">
    <input type="checkbox" style="width:17px;height:17px;cursor:pointer;accent-color:var(--accent)" ${tr.on?'checked':''} onchange="st('${t}','on',this.checked)"/>
    <span style="font-size:14px">${t}</span>
    <div style="display:flex;align-items:center;gap:7px">${tr.on?`<span class="tag ${tr.doc?'tg':'ta'}">${tr.doc?'Doc cargado':'Pendiente'}</span><button class="ub ${tr.doc?'done':''}" onclick="simUp('tr_${t}','${t}')">${tr.doc?'✓':'+'}</button>`:`<span class="tag tx">Inactivo</span>`}</div>
  </div>`;}).join('')}`;}

function tCierre(p){
  const ch=[
    {l:'Cotización obra civil cargada',ok:!!p.cats['Obra civil'].monto},
    {l:'Comprobante 1er anticipo subido',ok:!!p.pagos.a1.doc},
    {l:'Comprobante 2do anticipo subido',ok:!!p.pagos.a2.doc},
    {l:'Todas las cotizaciones cargadas',ok:CATS.every(c=>p.cats[c].monto)},
    {l:'Pago final registrado',ok:!!p.pagos.pf.fecha},
    {l:'Factura imprevistos registrada',ok:!!p.pagos.imp.monto},
    {l:'Señalética registrada',ok:!!p.pagos.sen.monto},
    {l:'Accesorios finales cotizados',ok:!!p.pagos.acc.monto},
    {l:'Trámites eléctricos completados',ok:TRAM.filter(t=>p.tram[t].on).every(t=>p.tram[t].doc)},
  ];
  const f=ch.filter(c=>!c.ok).length;
  return`<div class="stl" style="margin-top:0">Checklist de cierre</div>
  ${ch.map(c=>`<div class="ci"><div style="width:9px;height:9px;border-radius:50%;background:${c.ok?'var(--green)':'var(--red)'}"></div><div style="font-size:14px">${c.l}</div><span class="tag ${c.ok?'tg':'tx'}">${c.ok?'Listo':'Pendiente'}</span></div>`).join('')}
  <div class="al ${f===0?'al-g':'al-a'}" style="margin-top:14px">${f===0?'Todo completo. Podés cerrar el proyecto.':`Faltan <strong>${f} ítems</strong>.`}</div>
  <button class="btn ${f===0?'bp':'bg'}" style="width:100%;margin-top:10px;${f>0?'opacity:0.4;cursor:not-allowed':''}" ${f>0?'disabled':''} onclick="cerrarP()">${p.cerrado?'✓ Cerrado':'Marcar como cerrado'}</button>`;}

function crearP(){
  const n=document.getElementById('nn').value.trim();if(!n){alert('Ingresá un nombre');return;}
  const p=pDef(n,document.getElementById('nm').value,document.getElementById('nt').value,document.getElementById('nd').value);
  proy.push(p);closeM('mn');cur=p.id;vista='pj';render();autoSave();
}
function cerrarP(){const p=proy.find(x=>x.id===cur);if(!p||!confirm('¿Cerrar "'+p.nombre+'"?'))return;p.cerrado=true;p.estado='Finalizado';p.avanceFisico=100;render();autoSave();}
function delP(){const p=proy.find(x=>x.id===cur);if(!p||!confirm('¿Eliminar "'+p.nombre+'"?'))return;proy=proy.filter(x=>x.id!==cur);cur=null;vista='ov';render();autoSave();}

function expClaude(){
  const txt='RESUMEN DASHBOARD — '+new Date().toLocaleDateString('es-SV')+'\nFranquicias Int. — '+proy.length+' proyectos\n'+'═'.repeat(40)+'\n\n'+
  proy.map(p=>{const tot=totP(p),pag=pagP(p);return`PROYECTO: ${p.nombre}
  Marca: ${p.marca} | Tipo: ${p.tipo} | Ubicación: ${p.dir||'—'} | m²: ${p.m2||'—'}
  Estado: ${p.estado} | Fase: ${p.fase} | Avance: ${p.avanceFisico}%
  Contratista: ${p.contratista||'—'} | Supervisor: ${p.supervisor||'—'} | Responsable: ${p.responsable||'—'}
  Inicio: ${p.fechaInicio||'—'} | Entrega: ${p.fechaFin||'—'}
  Total: $${tot.toFixed(2)} | Pagado: $${pag.toFixed(2)} | Por pagar: $${(tot-pag).toFixed(2)}
  Cotizaciones: ${CATS.map(c=>`${c}: ${p.cats[c].monto?'$'+parseFloat(p.cats[c].monto).toFixed(2):'pendiente'}`).join(' | ')}
  Obs: ${p.observaciones||'—'}`;}).join('\n\n────────────────\n\n');
  const mo=document.createElement('div');mo.className='mo open';
  mo.innerHTML=`<div class="md" style="max-width:580px"><div class="mtt">Resumen para Claude</div><div class="mts">Copiá y pegá en una nueva conversación con Claude.</div>
  <textarea style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text2);font-size:12px;font-family:'DM Mono',monospace;padding:13px;height:300px;resize:vertical;line-height:1.6">${txt}</textarea>
  <div class="mf"><button class="btn bg" onclick="this.closest('.mo').remove()">Cerrar</button>
  <button class="btn bp" onclick="navigator.clipboard.writeText(this.closest('.md').querySelector('textarea').value).then(()=>{this.textContent='¡Copiado!';setTimeout(()=>this.textContent='Copiar todo',2000)})">Copiar todo</button></div></div>`;
  document.body.appendChild(mo);
}
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('click',e=>{if(e.target.classList.contains('mo'))e.target.classList.remove('open');});

window.onload=async()=>{
  setSS('sy','Cargando...');
  // Intentar Sheets primero
  try{
    const r=await fetch(WEB_APP_URL);
    const txt=await r.text();
    const j=JSON.parse(txt);
    const datos=parseDatos(j.data);
    if(datos){proy=datos;localStorage.setItem('fiq_v3',JSON.stringify(proy));setSS('ok','Sincronizado con Sheets');render();return;}
  }catch(e){}
  // Fallback localStorage
  const datos2=parseDatos(localStorage.getItem('fiq_v3'));
  if(datos2){proy=datos2;setSS('ok','Datos locales');render();return;}
  // Si nada, inicializar
  initData();setSS('ok','Listo');render();
};
</script>
</body>
</html>
