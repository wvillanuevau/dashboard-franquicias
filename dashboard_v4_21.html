<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Proyectos — Franquicias</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--bg2:#171717;--bg3:#1f1f1f;--bg4:#2a2a2a;
  --border:#2e2e2e;--border2:#3a3a3a;
  --text:#f0f0f0;--text2:#b0b0b0;--text3:#777;
  --accent:#e8ff47;--accent2:#c8e000;
  --green:#4ade80;--gbg:#0d2a1a;
  --amber:#fbbf24;--abg:#2a1f0a;
  --red:#f87171;--rbg:#2a0f0f;
  --blue:#60a5fa;--bbg:#0a1a2a;
  --r:10px;--rs:6px;
  --t1:#1a2a1a;--t1a:#4ade80;
  --t2:#1a1a2a;--t2a:#60a5fa;
  --t3:#2a1a0a;--t3a:#fbbf24;
  --t4:#2a0a1a;--t4a:#f472b6;
  --t5:#1a1a1a;--t5a:#a0a0a0;
  --t6:#0a2a2a;--t6a:#34d399;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.6;min-height:100vh}
.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh;align-items:start}
@media(max-width:768px){.app{grid-template-columns:1fr}.sb{display:none}.sb.open{display:flex;position:fixed;top:0;left:0;height:100vh;z-index:100;width:270px}}
.sb{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sbh{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.logo{font-size:12px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.ss{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--text3)}
.sd{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.sd.ok{background:var(--green)}.sd.sy{background:var(--amber);animation:pu 1s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:0.3}}
.pl{flex:1;overflow-y:auto;padding:10px 8px}
.pi{display:flex;align-items:center;gap:10px;padding:11px;border-radius:var(--rs);cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:all 0.15s}
.pi:hover{background:var(--bg3)}.pi.active{background:var(--bg3);border-color:var(--border2)}
.pd{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pif{flex:1;min-width:0}
.pn{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb2{font-size:11px;color:var(--text3);margin-top:1px}
.pp{font-size:12px;font-family:'DM Mono',monospace;color:var(--text3)}
.sbf{padding:12px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.bs{display:flex;align-items:center;gap:8px;padding:10px 13px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;width:100%}
.bs:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.bs.ac{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}.bs.ac:hover{background:var(--accent2)}
.bs.gr{background:var(--gbg);color:var(--green);border-color:var(--gbg)}.bs.gr:hover{border-color:var(--green)}
.mn{display:flex;flex-direction:column;overflow:hidden}
.tb{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--bg2)}
.tt{font-size:17px;font-weight:500;flex:1}.ts{font-size:12px;color:var(--text3);margin-top:1px}
.tag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap}
.tg{background:var(--gbg);color:var(--green)}.ta{background:var(--abg);color:var(--amber)}.tr{background:var(--rbg);color:var(--red)}.tbb{background:var(--bbg);color:var(--blue)}.tx{background:var(--bg4);color:var(--text3)}
.mb{display:none;background:transparent;border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:var(--rs);cursor:pointer;font-size:16px}
@media(max-width:768px){.mb{display:block}}
.ct{flex:1;overflow-y:auto;padding:24px}
@media(max-width:768px){.ct{padding:16px}}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.sl{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.sv{font-size:24px;font-weight:500;font-family:'DM Mono',monospace}
.tabs{display:flex;gap:3px;border-bottom:1px solid var(--border);margin-bottom:22px;overflow-x:auto}
.tab{padding:10px 18px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;border-bottom:none;border-radius:var(--rs) var(--rs) 0 0;margin-bottom:-1px;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all 0.15s;color:var(--text3);background:transparent}
.tab:hover{color:var(--text2);background:var(--bg3)}
.tab.t1.active{background:var(--t1);color:var(--t1a);border-color:var(--border)}
.tab.t2.active{background:var(--t2);color:var(--t2a);border-color:var(--border)}
.tab.t3.active{background:var(--t3);color:var(--t3a);border-color:var(--border)}
.tab.t4.active{background:var(--t4);color:var(--t4a);border-color:var(--border)}
.tab.t5.active{background:var(--t5);color:var(--t5a);border-color:var(--border)}
.tab.t6.active{background:var(--t6);color:var(--t6a);border-color:var(--border)}
.stl{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin:22px 0 12px}.stl:first-child{margin-top:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
@media(max-width:600px){.g2,.g3{grid-template-columns:1fr}}
.fi{display:flex;flex-direction:column;gap:5px}
.fi label{font-size:12px;color:var(--text3);font-weight:500}
.fi input,.fi select,.fi textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:14px;padding:10px 12px;font-family:'DM Sans',sans-serif;transition:border 0.15s;width:100%}
.fi input:focus,.fi select:focus,.fi textarea:focus{outline:none;border-color:var(--border2)}
.fi select option{background:var(--bg3)}.fi textarea{resize:vertical;min-height:70px;line-height:1.5}
.fc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.fh{display:flex;align-items:center;gap:12px;padding:15px 17px;cursor:pointer;user-select:none;transition:background 0.15s}.fh:hover{background:var(--bg3)}
.fn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.fn1{background:var(--gbg);color:var(--green)}.fn2{background:var(--bbg);color:var(--blue)}.fn3{background:var(--abg);color:var(--amber)}
.fbd{padding:15px 17px;border-top:1px solid var(--border);display:none}.fbd.open{display:block}
.row{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center;padding:11px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:7px}
.rn{font-size:14px;font-weight:500}.rno{font-size:12px;color:var(--text3);margin-top:2px}
.rm{font-size:13px;font-family:'DM Mono',monospace;font-weight:500;white-space:nowrap}
.ub{background:transparent;border:1px solid var(--border2);color:var(--text3);width:32px;height:32px;border-radius:var(--rs);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
.ub:hover{background:var(--bg4);color:var(--text)}.ub.done{background:var(--gbg);border-color:var(--green);color:var(--green)}
.prb{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}.prf{height:100%;border-radius:3px}
.prl{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:4px}
.ti{display:grid;grid-template-columns:20px 1fr auto;gap:10px;align-items:center;padding:11px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:7px;transition:border 0.15s}
.ti.on{border-color:var(--border2);background:var(--bg4)}
.ci{display:grid;grid-template-columns:12px 1fr auto;gap:10px;align-items:center;padding:10px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:6px}
.btn{padding:10px 20px;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;border:1px solid transparent}
.bp{background:var(--accent);color:#000;border-color:var(--accent)}.bp:hover{background:var(--accent2)}
.bg{background:transparent;color:var(--text2);border-color:var(--border)}.bg:hover{background:var(--bg3);color:var(--text)}
.bd{background:transparent;color:var(--red);border-color:var(--rbg)}.bd:hover{background:var(--rbg)}
.brow{display:flex;justify-content:flex-end;gap:8px;margin-top:22px;padding-top:16px;border-top:1px solid var(--border)}
.al{padding:12px 15px;border-radius:var(--rs);font-size:13px;margin-bottom:13px;border-left:3px solid}
.al-a{background:var(--abg);color:var(--amber);border-color:var(--amber)}
.al-g{background:var(--gbg);color:var(--green);border-color:var(--green)}
.al-b{background:var(--bbg);color:var(--blue);border-color:var(--blue)}
.al-r{background:var(--rbg);color:var(--red);border-color:var(--red)}
.oc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:17px;margin-bottom:11px;cursor:pointer;transition:border 0.15s}.oc:hover{border-color:var(--border2)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}.mo.open{display:flex}
.md{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.mtt{font-size:16px;font-weight:600;margin-bottom:6px}.mts{font-size:13px;color:var(--text3);margin-bottom:16px}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.cr-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
.cr-table th{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;background:var(--bg3)}
.cr-table td{padding:8px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle}
.cr-table tr:last-child td{border-bottom:none}
.cr-madre{background:var(--bg3);font-weight:600;font-size:14px}
.cr-sub td{font-size:13px;color:var(--text2)}
.gantt-wrap{overflow-x:auto;margin-top:16px}
.gantt-grid{min-width:600px}
.gantt-row{display:flex;align-items:center;gap:0;height:28px;margin-bottom:3px}
.gantt-label{width:200px;font-size:12px;color:var(--text2);flex-shrink:0;padding-right:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-track{flex:1;background:var(--bg3);border-radius:3px;height:18px;position:relative}
.gantt-bar{height:100%;border-radius:3px;position:absolute;min-width:4px}
.gantt-header{display:flex;align-items:center;height:20px;margin-bottom:6px}
.gantt-hlabel{width:200px;flex-shrink:0}
.gantt-htrack{flex:1;display:flex;justify-content:space-between;padding:0 4px}
.gantt-hday{font-size:10px;color:var(--text3)}
.add-row-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;background:transparent;border:1px dashed var(--border2);border-radius:var(--rs);color:var(--text3);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;width:100%;margin-top:4px}
.add-row-btn:hover{border-color:var(--text3);color:var(--text);background:var(--bg3)}
.del-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px 7px;border-radius:var(--rs);transition:all 0.15s;flex-shrink:0}
.del-btn:hover{background:var(--rbg);color:var(--red)}
.gg-form{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:20px}
.gg-table{width:100%;border-collapse:collapse;font-size:13px}
.gg-table th{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--bg3);text-align:left}
.gg-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.gg-table tr:hover td{background:var(--bg3)}
.gg-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;font-family:'DM Mono',monospace}
#toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rs);padding:13px 18px;font-size:13px;color:var(--text);z-index:300;display:none;max-width:300px}
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:40px;width:100%;max-width:380px;text-align:center}
.login-logo{font-size:12px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.login-title{font-size:22px;font-weight:600;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:32px}
.login-pin{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--border2);transition:all 0.2s}
.pin-dot.filled{background:var(--accent)}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.pin-key{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:16px;font-size:18px;font-weight:500;cursor:pointer;font-family:'DM Mono',monospace;color:var(--text);transition:all 0.15s;user-select:none}
.pin-key:hover{background:var(--bg4);border-color:var(--border2)}
.pin-key:active{background:var(--accent);color:#000;border-color:var(--accent)}
.pin-key.del{font-size:14px;color:var(--text3)}
.login-user-select{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.login-user-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:12px 16px;font-size:14px;font-weight:500;cursor:pointer;color:var(--text);font-family:'DM Sans',sans-serif;transition:all 0.15s;text-align:left;display:flex;align-items:center;gap:10px}
.login-user-btn:hover{background:var(--bg4);border-color:var(--border2)}
.login-user-btn.selected{border-color:var(--accent);background:var(--bg4)}
.login-error{color:var(--red);font-size:13px;margin-bottom:12px;min-height:20px}
.login-block{color:var(--amber);font-size:13px;margin-bottom:12px}
@media print{
  .sb,.tb,.tabs,.brow,.btn,.add-row-btn,.del-btn,.ub,.mo{display:none!important}
  body{background:#fff;color:#000;font-size:12px}
  .ct{padding:0}
  #print-header{display:block!important}
  .gantt-label{color:#333}.gantt-track{background:#eee}
  .cr-table th{background:#f5f5f5;color:#333}
  .cr-table td{color:#333;border-color:#ddd}
}
#print-header{display:none;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #333}
</style>

<div class="app">

</div>

<script>

function guardar(){
  setSS('sy','Guardando...');
  const payload={proy,config,ts:new Date().toISOString()};
  localStorage.setItem('fiq_v4',JSON.stringify(payload));
  // POST via hidden iframe to avoid CORS and URL length limits
  const data=JSON.stringify(payload);
  const iframeId='gf_'+Date.now();
  const formId='gform_'+Date.now();
  const iframe=document.createElement('iframe');
  iframe.name=iframeId;iframe.id=iframeId;
  iframe.style.cssText='display:none;position:absolute;width:0;height:0';
  document.body.appendChild(iframe);
  const form=document.createElement('form');
  form.method='POST';form.action=WEB_APP_URL;form.target=iframeId;
  form.style.display='none';

  inp.type='hidden';inp.name='data';inp.value=data;
  form.appendChild(inp);

  iframe.onload=function(){
    setTimeout(function(){
      try{iframe.remove();}catch(e){}
      try{form.remove();}catch(e){}
    },1000);
    setSS('ok','Guardado en Sheets · '+new Date().toLocaleTimeString('es-SV',{hour:'2-digit',minute:'2-digit'}));
    toast('✓ Guardado en Google Sheets');

  form.submit();

    try{iframe.remove();}catch(e){}
    try{form.remove();}catch(e){}
  },10000);
}

function parseDatos(raw){
  if(!raw||raw.length<5)return null;
  try{
    const p=JSON.parse(raw);
    // New format: {proy:[...], config:{...}}
    if(p&&Array.isArray(p.proy)){
      if(p.config)config=Object.assign(config,p.config);
      return p.proy;
    }
    if(Array.isArray(p)&&p.length>0)return p;
    if(p&&Array.isArray(p.data)&&p.data.length>0)return p.data;
    if(typeof p==='string'){
      const p2=JSON.parse(p);
      if(p2&&Array.isArray(p2.proy)){if(p2.config)config=Object.assign(config,p2.config);return p2.proy;}
      if(Array.isArray(p2))return p2;
      if(p2&&Array.isArray(p2.data))return p2.data;
    }
  }catch(e){}
  return null;
}

function cargar(){
  setSS('sy','Cargando desde Sheets...');
  const cbName='cbLoad_'+Date.now();
  window[cbName]=function(j){
    delete window[cbName];
    if(document.getElementById(cbName))document.getElementById(cbName).remove();
    const datos=parseDatos(j&&j.data?j.data:'');
    if(datos){
      proy=datos;
      localStorage.setItem('fiq_v4',JSON.stringify({proy:proy,config:config}));
      setSS('ok','Cargado desde Sheets · '+new Date().toLocaleTimeString('es-SV',{hour:'2-digit',minute:'2-digit'}));
      renderLoginScreen();render();
      toast('✓ Datos cargados desde Sheets');
    } else {
      usarLocal();
    }
  };
  const s=document.createElement('script');
  s.id=cbName;
  s.onerror=function(){delete window[cbName];s.remove();usarLocal();};
  s.src=WEB_APP_URL+'?action=last&callback='+cbName+'&t='+Date.now();
  document.head.appendChild(s);
  setTimeout(function(){if(window[cbName]){delete window[cbName];usarLocal();}},8000);
}
function usarLocal(){
  const local=localStorage.getItem('fiq_v4');
  const datos=parseDatos(local);
  if(datos){proy=datos;setSS('ok','Datos locales');renderLoginScreen();render();}

const fmt=n=>(parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
function totCats(p){
  if(!p||!p.cats||!p.cats['Obra civil'])return 0;
  const ocM=parseFloat(p.cats['Obra civil'].monto||0);
  let t=ocM;
  if(p.catsCotiz){
    const allCatNames=[...CATS_STD.filter(c=>c!=='Obra civil'),...(p.customCats||[])];
    allCatNames.forEach(cn=>{
      const items=p.catsCotiz[cn]||[];
      t+=items.reduce((s,x)=>s+(parseFloat(x.monto)||0),0);
    });
  } else {
    t+=CATS_STD.filter(c=>c!=='Obra civil').reduce((s,c)=>s+(parseFloat(p.cats[c]?.monto)||0),0);
    if(p.catsExtra)t+=p.catsExtra.reduce((s,c)=>s+(parseFloat(c.monto)||0),0);
  }
  t+=(parseFloat(p.pagos&&p.pagos.imp&&p.pagos.imp.monto)||0);
  return t;
}
function pagCats(p){
  if(!p||!p.cats||!p.cats['Obra civil'])return 0;
  const ocM=parseFloat(p.cats['Obra civil'].monto||0);
  const pct1=parseFloat(p.pagos&&p.pagos.a1&&p.pagos.a1.pct||65);
  const pct2=parseFloat(p.pagos&&p.pagos.a2&&p.pagos.a2.pct||25);
  const pct3=parseFloat(p.pagos&&p.pagos.pf&&p.pagos.pf.pct||10);
  let t=(p.pagos&&p.pagos.a1&&p.pagos.a1.paid?ocM*pct1/100:0)
    +(p.pagos&&p.pagos.a2&&p.pagos.a2.paid?ocM*pct2/100:0)
    +(p.pagos&&p.pagos.pf&&p.pagos.pf.paid?ocM*pct3/100:0)
    +(p.pagos&&p.pagos.imp&&p.pagos.imp.paid?parseFloat(p.pagos&&p.pagos.imp&&p.pagos.imp.monto||0):0);
  if(p.catsCotiz){
    const allCatNames=[...CATS_STD.filter(c=>c!=='Obra civil'),...(p.customCats||[])];
    allCatNames.forEach(cn=>{
      const items=p.catsCotiz[cn]||[];
      t+=items.reduce((s,x)=>s+(parseFloat(x&&x.pagado||0)||0),0);
    });
  } else if(p.cats){
    CATS_STD.filter(c=>c!=='Obra civil').forEach(c=>{
      if(p.cats[c])t+=parseFloat(p.cats[c].pagado||0);
    });
    if(p.catsExtra)t+=p.catsExtra.reduce((s,c)=>s+(parseFloat(c&&c.pagado||0)||0),0);
  }
  return t;
}

function calcCronograma(cr,fechaInicio){
  if(!fechaInicio)return cr;
  let d=new Date(fechaInicio+'T00:00:00');d.setDate(d.getDate()+1);
  return cr.map(m=>{
    const ini=new Date(d);const fin=new Date(d);fin.setDate(fin.getDate()+m.dias-1);
    d.setDate(d.getDate()+m.dias);
    return{...m,fechaIni:ini.toLocaleDateString('es-SV'),fechaFin:fin.toLocaleDateString('es-SV')};
  });
}

function guardarProveedor(){
  var nombre=document.getElementById('pv-nombre').value.trim();
  var tipo=document.getElementById('pv-tipo').value.trim();
  var tel=document.getElementById('pv-tel').value.trim();
  var nit=document.getElementById('pv-nit').value.trim();
  if(!nombre){toast('El nombre es obligatorio');return;}
  if(proveedores.find(function(p){return p.nombre.toLowerCase()===nombre.toLowerCase();})){
    toast('Ya existe un proveedor con ese nombre');return;
  }
  proveedores.push({id:'pv'+Date.now(),nombre:nombre,tipo:tipo,telefono:tel,nit:nit});
  guardarProveedoresSheet();
  renderProv();
  toast('✓ Proveedor registrado: '+nombre);
}

function delProveedor(id){
  if(!confirm('¿Eliminar este proveedor?'))return;
  proveedores=proveedores.filter(function(p){return p.id!==id;});
  guardarProveedoresSheet();renderProv();
}

function guardarProveedoresSheet(){
  localStorage.setItem('fiq_proveedores',JSON.stringify(proveedores));
  var data=JSON.stringify({proveedores:proveedores,centrosCosto:centrosCosto,ts:new Date().toISOString()});
  var iframeId='pvf_'+Date.now();
  var iframe=document.createElement('iframe');
  iframe.name=iframeId;iframe.id=iframeId;
  iframe.style.cssText='display:none;position:absolute;width:0;height:0';
  document.body.appendChild(iframe);
  var form=document.createElement('form');
  form.method='POST';form.action=WEB_APP_URL;form.target=iframeId;form.style.display='none';
  var inp1=document.createElement('input');inp1.type='hidden';inp1.name='sheet';inp1.value='3';
  var inp2=document.createElement('input');inp2.type='hidden';inp2.name='data';inp2.value=data;
  form.appendChild(inp1);form.appendChild(inp2);
  document.body.appendChild(form);form.submit();
  setTimeout(function(){try{iframe.remove();form.remove();}catch(e){}},5000);
}

function cargarProveedoresSheet(){
  var cbName='cbPV_'+Date.now();
  window[cbName]=function(j){
    delete window[cbName];
    if(document.getElementById(cbName))document.getElementById(cbName).remove();
    if(j&&j.data){
      try{
        var parsed=JSON.parse(j.data);
        if(parsed&&parsed.proveedores){
          proveedores=parsed.proveedores;
          localStorage.setItem('fiq_proveedores',JSON.stringify(proveedores));
        }
        if(parsed&&parsed.centrosCosto){
          centrosCosto=parsed.centrosCosto;
          localStorage.setItem('fiq_cc',JSON.stringify(centrosCosto));
        }
      }catch(e){}
    }
    if(vista==='prov')renderProv();
  };
  var s=document.createElement('script');s.id=cbName;
  s.onerror=function(){delete window[cbName];s.remove();};
  s.src=WEB_APP_URL+'?action=last&sheet=3&callback='+cbName+'&t='+Date.now();
  document.head.appendChild(s);
}

function tPagosYCotiz(p){
  const tramTot=0; // tramites eliminados
  const ocMonto=parseFloat(p.cats['Obra civil'].monto||0);
  if(!p.pagos.a1.pct)p.pagos.a1.pct='65';
  if(!p.pagos.a2.pct)p.pagos.a2.pct='25';
  if(!p.pagos.pf.pct)p.pagos.pf.pct='10';
  const pct1=parseFloat(p.pagos.a1.pct||65);
  const pct2=parseFloat(p.pagos.a2.pct||25);
  const pct3=parseFloat(p.pagos.pf.pct||10);
  const pctTot=pct1+pct2+pct3;
  const pctOk=Math.abs(pctTot-100)<0.01;
  const monto1=ocMonto>0?(ocMonto*pct1/100):0;
  const monto2=ocMonto>0?(ocMonto*pct2/100):0;
  const monto3=ocMonto>0?(ocMonto*pct3/100):0;
  const ocPagado=(p.pagos.a1.paid?monto1:0)+(p.pagos.a2.paid?monto2:0)+(p.pagos.pf.paid?monto3:0)+parseFloat(p.pagos.imp.monto||0);
  const ocPct=ocMonto>0?Math.min(100,Math.round(ocPagado/ocMonto*100)):0;

  // Init multi-cotiz structure if needed
  if(!p.catsCotiz){
    p.catsCotiz={};
    const otrosCats=CATS_STD.filter(c2=>c2!=='Obra civil');
    otrosCats.forEach(c2=>{
      const old=p.cats[c2];
      p.catsCotiz[c2]=[{id:'c0',monto:old.monto||'',pagado:old.pagado||'',doc:old.doc||'',nombre:'Cotización 1'}];
    });
    if(p.catsExtra&&p.catsExtra.length){
      p.catsExtra.forEach(ce=>{
        p.catsCotiz[ce.nombre]=[{id:'c0',monto:ce.monto||'',pagado:ce.pagado||'',doc:ce.doc||'',nombre:'Cotización 1'}];
      });
    }
    if(!p.catsExtra)p.catsExtra=[];
    // custom categories list
    if(!p.customCats)p.customCats=[];
  }
  if(!p.customCats)p.customCats=[];

  const allCatNames=[...CATS_STD.filter(c2=>c2!=='Obra civil'),...p.customCats];

  // Calc totals
  const cotizTot=allCatNames.reduce((s,cn)=>{
    const items=p.catsCotiz[cn]||[];
    return s+items.reduce((s2,x)=>s2+(parseFloat(x.monto)||0),0);
  },0);
  const grandTotal=ocMonto+cotizTot;

  return`
  <!-- OFERTA OBRA CIVIL -->
  <div class="fc" style="margin-bottom:20px;${!p.cats['Obra civil'].doc&&ocMonto>0?'border-color:var(--red)':''}">
    <div class="fh" onclick="this.nextElementSibling.classList.toggle('open')">
      <div class="fn fn1">1</div>
      <span style="font-size:15px;font-weight:500;flex:1">Oferta obra civil aceptada</span>
      <span style="font-size:13px;font-family:'DM Mono',monospace;color:var(--text2);margin-right:10px">$${fmt(ocMonto)}</span>
      <span class="tag ${ocPct>=100?'tg':ocPct>0?'ta':'tx'}">${ocPct}% pagado</span>
    </div>
    <div class="fbd open" style="padding:0">
      <div style="padding:14px 17px;border-bottom:1px solid var(--border)">
        <div class="stl" style="margin-top:0">Monto total de la oferta</div>
        <div class="g2">
          <div class="fi"><label>Monto total ($)</label>
            <input type="number" value="${p.cats['Obra civil'].monto}" placeholder="0.00"
              oninput="sc('Obra civil','monto',this.value)" onblur="recalcOC()"/>
          </div>
          <div class="fi"><label>Oferta aceptada (archivo)${!p.cats['Obra civil'].doc&&ocMonto>0?' <span style=color:var(--red)>*obligatorio</span>':''}</label>
            <button class="btn ${p.cats['Obra civil'].doc?'bg':'bd'}" style="font-size:12px;padding:8px 12px" onclick="upCat('Obra civil')">
              ${p.cats['Obra civil'].doc?`<a href="${ONEDRIVE_URL}" target="_blank" onclick="event.stopPropagation()" style="color:inherit;text-decoration:none">📄 ${p.cats['Obra civil'].doc}</a>`:'+ Subir oferta (obligatorio)'}
            </button>
          </div>
        </div>
        ${ocMonto>0?`<div class="prb" style="margin-top:10px"><div class="prf" style="width:${ocPct}%;background:var(--green)"></div></div>

              <div><div style="font-size:11px;color:var(--text3)">Proveedor</div>
                <div style="font-size:13px;font-weight:500">${item.gastoVinculado.proveedor}</div>
              </div>
              <div><div style="font-size:11px;color:var(--text3)">Fecha</div>
                <div style="font-size:13px;font-family:DM Mono,monospace">${item.gastoVinculado.fecha}</div>
              </div>
              <div><div style="font-size:11px;color:var(--text3)">N° Factura</div>
                <div style="font-size:13px;font-family:DM Mono,monospace">${item.gastoVinculado.factura}</div>

            <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px">
              <button class="btn bg" style="font-size:11px;padding:6px 12px;color:var(--blue);border-color:var(--blue)" 
                onclick="abrirVincularGasto('${cn}',${idx})">
                🔗 ${item.gastoVinculado?'Cotización: #'+String(item.gastoVinculado.correlativo||'').padStart(4,'0')+' — '+item.gastoVinculado.descripcion.slice(0,25):'Vincular cotización aceptada'}

      }).join('')}
      <div style="padding:10px 17px;border-top:1px solid var(--border)">

function addPlano(tipo){
  const p=proy.find(x=>x.id===cur);if(!p)return;
  if(!p.planos)p.planos={dwg:[],pdf:[],renders:[]};
  const ext=tipo==='dwg'?'.dwg,.dxf':'.pdf';
  const input=document.createElement('input');input.type='file';input.accept=ext;
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const desc=prompt('Descripción del plano (opcional):','');
    p.planos[tipo].push({nombre:file.name,desc:desc||'',fecha:new Date().toLocaleDateString('es-SV')});
    autoSave();refreshPlanos();
    // Show OneDrive modal
    const mo=document.createElement('div');mo.className='mo open';
    mo.innerHTML=`<div class="md" style="max-width:440px">
      <div class="mtt" style="color:var(--green)">✓ Plano registrado</div>
      <div class="mts">${file.name}</div>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:14px;margin-bottom:14px">
        <div style="font-size:11px;color:var(--text3);margin-bottom:8px;text-transform:uppercase">Guardalo en OneDrive</div>
        <button onclick="window.open('${ONEDRIVE_URL}','_blank')" style="display:flex;align-items:center;gap:8px;color:var(--accent);font-size:14px;font-weight:500;cursor:pointer;padding:10px 14px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--rs);font-family:'DM Sans',sans-serif;width:100%">
          📁 Abrir carpeta en OneDrive
        </button>
      </div>
      <div class="mf"><button class="btn bp" onclick="this.closest('.mo').remove()">Entendido</button></div>
    </div>`;
    document.body.appendChild(mo);
  };input.click();
}

function delPlano(tipo,idx){
  const p=proy.find(x=>x.id===cur);if(!p||!p.planos)return;
  p.planos[tipo].splice(idx,1);autoSave();refreshPlanos();
}

function addRender(){
  const p=proy.find(x=>x.id===cur);if(!p)return;
  if(!p.planos)p.planos={dwg:[],pdf:[],renders:[]};
  if(p.planos.renders.length>=10){toast('Límite de 10 imágenes');return;}
  const input=document.createElement('input');input.type='file';input.accept='image/*';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const desc=prompt('Descripción de la imagen (opcional):','');
    const reader=new FileReader();
    reader.onload=ev=>{
      p.planos.renders.push({nombre:file.name,desc:desc||'',dataUrl:ev.target.result,fecha:new Date().toLocaleDateString('es-SV')});
      autoSave();refreshPlanos();
    };
    reader.readAsDataURL(file);
  };input.click();
}

function delRender(idx){
  const p=proy.find(x=>x.id===cur);if(!p||!p.planos)return;
  p.planos.renders.splice(idx,1);autoSave();refreshPlanos();
}

}

function tCronograma(p){

  // Recalculate madre dias = sum of sub dias
  p.cronograma.forEach(function(m){

function cronoSubChange(el){

  var sid=el.getAttribute('data-sid');
  var field=el.getAttribute('data-field');
  var p=proy.find(function(x){return x.id===cur;});if(!p)return;

      el.value=val;

  }
  s[field]=field==='m2'||field==='precio'||field==='dias'?parseFloat(val)||0:val;
  autoSave();

}

function buildGanttFromCrono(cronograma){
  var entries=[];
  var today=new Date();today.setHours(0,0,0,0);
  cronograma.forEach(function(m,i){
    var color=GANTT_COLORS[i%GANTT_COLORS.length];
    // Use sub fechaInicio for gantt — each sub can have own date
    (m.sub||[]).forEach(function(s){
      if(s.fechaInicio&&s.dias){
        var yr=parseInt(s.fechaInicio.split('-')[0]);
        var safeDate=yr<100?(String(yr+2000)+s.fechaInicio.slice(String(yr).length)):s.fechaInicio;
        var fIni=new Date(safeDate+'T00:00:00');
        if(isNaN(fIni.getTime()))return;
        entries.push({
          nombre:m.nombre+(m.sub.length>1?' — '+s.desc:''),
          fIni:fIni,
          dias:parseInt(s.dias)||0,
          color:color,
          avance:s.done?100:0
        });
      }
    });
    // Fallback: if madre has fechaInicio (old data)
    if((!m.sub||!m.sub.length)&&m.fechaInicio&&m.dias){
      var fIni=new Date(m.fechaInicio+'T00:00:00');
      if(!isNaN(fIni.getTime()))
        entries.push({nombre:m.nombre,fIni:fIni,dias:parseInt(m.dias)||0,color:color,avance:parseFloat(m.avance)||0});
    }
  });
  if(!entries.length)return'<div class="al al-b" style="margin-top:16px">Ingresá fechas de inicio en las partidas para ver el Gantt.</div>';

  var allMs=[];
  entries.forEach(function(e){
    allMs.push(e.fIni.getTime());
    var fFin=new Date(e.fIni);fFin.setDate(fFin.getDate()+e.dias);
    allMs.push(fFin.getTime());
  });
  var minDate=new Date(Math.min.apply(null,allMs));
  var maxDate=new Date(Math.max.apply(null,allMs));
  var totalSpan=Math.max(1,Math.round((maxDate-minDate)/(1000*60*60*24)));
  var todayPct=today>=minDate&&today<=maxDate?Math.round((today-minDate)/(1000*60*60*24)/totalSpan*100):-1;

  var weekLabels='';var weekLines='';
  var wd=new Date(minDate);
  while(wd<=maxDate){
    var pct=Math.round((wd-minDate)/(1000*60*60*24)/totalSpan*100);
    weekLabels+='<div style="position:absolute;left:'+pct+'%;transform:translateX(-50%);font-size:9px;color:var(--text3);white-space:nowrap">'+wd.toLocaleDateString('es-SV',{day:'2-digit',month:'short'})+'</div>';
    weekLines+='<div style="position:absolute;left:'+pct+'%;top:0;bottom:0;width:1px;background:var(--border);opacity:0.4"></div>';
    wd.setDate(wd.getDate()+7);
  }
  var todayLine=todayPct>=0?'<div style="position:absolute;left:'+todayPct+'%;top:0;bottom:0;width:2px;background:var(--red);z-index:4;opacity:0.9"></div>':'';
  var LW=170;

  var rows=entries.map(function(e){
    var offsetPct=Math.round((e.fIni.getTime()-minDate.getTime())/(1000*60*60*24)/totalSpan*100);
    var widthPct=Math.max(2,Math.round(e.dias/totalSpan*100));
    var shortName=e.nombre.length>22?e.nombre.slice(0,20)+'…':e.nombre;
    var fFin=new Date(e.fIni);fFin.setDate(fFin.getDate()+e.dias);
    return'<div style="display:flex;align-items:center;margin-bottom:8px">'+
      '<div style="width:'+LW+'px;flex-shrink:0;padding-right:10px;font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+e.nombre+'">'+shortName+'</div>'+
      '<div style="flex:1;position:relative;height:28px;margin-bottom:'+(widthPct>15?'14px':'0')+'">'+
        weekLines+todayLine+
        '<div style="position:absolute;left:'+offsetPct+'%;width:'+widthPct+'%;height:100%;border-radius:4px;background:'+e.color+'22;border:1px solid '+e.color+'66;overflow:hidden;z-index:1">'+
          (e.avance>0?'<div style="position:absolute;left:0;top:0;height:100%;width:'+e.avance+'%;background:'+e.color+';opacity:0.6;border-radius:3px"></div>':'')+
          (widthPct>8?'<div style="position:absolute;inset:0;display:flex;align-items:center;padding:0 6px;z-index:2"><span style="font-size:10px;font-weight:600;color:'+e.color+';white-space:nowrap">'+e.dias+'d'+(e.avance>0?' · '+e.avance+'%':'')+'</span></div>':'')+
        '</div>'+
        (widthPct>15?'<div style="position:absolute;left:'+offsetPct+'%;width:'+widthPct+'%;top:100%;margin-top:2px;display:flex;justify-content:space-between;padding:0 2px">'+
          '<span style="font-size:9px;color:var(--text3)">'+e.fIni.toLocaleDateString('es-SV',{day:'2-digit',month:'short'})+'</span>'+
          '<span style="font-size:9px;color:var(--text3)">'+fFin.toLocaleDateString('es-SV',{day:'2-digit',month:'short'})+'</span>'+
        '</div>':'')+
      '</div>'+
    '</div>';
  }).join('');

  return'<div class="stl" style="margin-top:20px">Gantt — cronograma de obra civil</div>'+
  '<div style="overflow-x:auto;padding-bottom:8px"><div style="min-width:600px">'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">'+
      (todayPct>=0?'<div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:3px;background:var(--red);border-radius:2px"></div><span style="font-size:11px;color:var(--text3)">Hoy: '+today.toLocaleDateString('es-SV',{day:'2-digit',month:'short',year:'numeric'})+'</span></div>':'')+
      '<div style="display:flex;align-items:center;gap:5px"><div style="width:14px;height:10px;background:var(--green);opacity:0.5;border-radius:2px"></div><span style="font-size:11px;color:var(--text3)">% avance</span></div>'+
    '</div>'+
    '<div style="display:flex;margin-bottom:8px">'+
      '<div style="width:'+LW+'px;flex-shrink:0"></div>'+
      '<div style="flex:1;position:relative;height:18px">'+weekLabels+'</div>'+
    '</div>'+
    rows+
    '<div style="display:flex;margin-top:16px;padding-top:10px;border-top:1px solid var(--border)">'+
      '<div style="width:'+LW+'px;flex-shrink:0;font-size:11px;color:var(--text3)">'+entries.length+' partidas</div>'+
      '<div style="flex:1;display:flex;justify-content:space-between">'+
        '<span style="font-size:11px;color:var(--text3)">'+minDate.toLocaleDateString('es-SV',{day:'2-digit',month:'short',year:'numeric'})+'</span>'+
        '<span style="font-size:11px;color:var(--text3)">'+maxDate.toLocaleDateString('es-SV',{day:'2-digit',month:'short',year:'numeric'})+'</span>'+
      '</div>'+
    '</div>'+
    '<div class="stl" style="margin-top:20px">% de avance por partida</div>'+
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">'+
      cronograma.map(function(m,i){
        return'<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;display:flex;align-items:center;gap:8px">'+
          '<div style="width:10px;height:10px;border-radius:50%;background:'+GANTT_COLORS[i%GANTT_COLORS.length]+';flex-shrink:0"></div>'+
          '<span style="font-size:12px;flex:1;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+m.nombre+'">'+m.nombre+'</span>'+
          '<input type="number" min="0" max="100" value="'+(m.avance||0)+'" '+
          'data-mid="'+m.id+'" data-field="avance" class="crono-m-input crono-refresh" onchange="cronoCatChange(this)" '+
          'style="width:54px;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;color:var(--accent);font-size:12px;padding:4px 6px;font-family:DM Mono,monospace;text-align:center"/>'+
          '<span style="font-size:11px;color:var(--text3)">%</span>'+
        '</div>';
      }).join('')+
    '</div>'+
  '</div></div>';
}

  mf.appendChild(btnC);div.appendChild(mf);mo.appendChild(div);
  document.body.appendChild(mo);
}

function vincularGasto(cn,idx,gastoId){
  var p=proy.find(function(x){return x.id===cur;});if(!p)return;
  if(!p.catsCotiz||!p.catsCotiz[cn]||!p.catsCotiz[cn][idx])return;
  var g=gastos.find(function(x){return x.id===gastoId;});if(!g)return;
  p.catsCotiz[cn][idx].gastoVinculado={
    id:g.id,
    correlativo:g.correlativo,
    descripcion:g.descripcion,
    proveedor:g.proveedor,
    valor:g.valor,
    fecha:g.fecha,
    factura:g.factura
  };
  // Auto-fill monto if empty
  if(!p.catsCotiz[cn][idx].monto||parseFloat(p.catsCotiz[cn][idx].monto)===0){
    p.catsCotiz[cn][idx].monto=g.valor;
  }
  document.querySelectorAll('.mo.open').forEach(function(m){m.remove();});
  autoSave();refreshPF();
  toast('✓ Vinculado: '+g.descripcion);
}


function delParcial(cn,idx,gi){
  var p=proy.find(function(x){return x.id===cur;});if(!p)return;
  if(!p.catsCotiz||!p.catsCotiz[cn]||!p.catsCotiz[cn][idx])return;
  var item=p.catsCotiz[cn][idx];
  if(!item.gastosParciales)return;
  item.gastosParciales.splice(gi,1);
  autoSave();refreshPF();updateStatCards();
}

function abrirVincularParcial(cn,idx){
  if(!gastos||!gastos.length){
    toast('No hay gastos registrados. Registrá primero en Gastos Generales.');return;
  }
  var p=proy.find(function(x){return x.id===cur;});if(!p)return;
  var item=p.catsCotiz&&p.catsCotiz[cn]?p.catsCotiz[cn][idx]:null;if(!item)return;
  var usados=(item.gastosParciales||[]).map(function(gp){return gp.id;});
  if(item.gastoVinculado)usados.push(item.gastoVinculado.id);

  var mo=document.createElement('div');mo.className='mo open';
  var rows=gastos.filter(function(g){return usados.indexOf(g.id)<0;}).slice().reverse().map(function(g){
    return'<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s" '+
      'onmouseover="this.style.background=\'var(--bg3)\'" onmouseout="this.style.background=\'\'" '+
      'onclick="vincularParcial(\''+cn+'\','+idx+',\''+g.id+'\')">'+
      '<div style="font-family:DM Mono,monospace;font-size:11px;color:var(--text3);flex-shrink:0">#'+String(g.correlativo||'').padStart(4,'0')+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+g.descripcion+'</div>'+
        '<div style="font-size:11px;color:var(--text3)">'+g.proveedor+' · '+g.fecha+'</div>'+
      '</div>'+
      '<div style="font-size:14px;font-weight:700;font-family:DM Mono,monospace;color:var(--accent);flex-shrink:0">$'+fmt(parseFloat(g.valor||0))+'</div>'+
    '</div>';
  }).join('');

  if(!rows)rows='<div style="padding:20px;text-align:center;color:var(--text3)">No hay más gastos disponibles para vincular</div>';

  var div=document.createElement('div');div.className='md';div.style.maxWidth='560px';
  div.innerHTML='<div class="mtt">+ Agregar pago parcial</div>'+
    '<div class="mts">Seleccioná el registro de gasto correspondiente a este pago.</div>'+
    '<div style="max-height:360px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--rs)">'+rows+'</div>';
  var mf=document.createElement('div');mf.className='mf';
  var btnC=document.createElement('button');btnC.className='btn bg';btnC.textContent='Cancelar';
  btnC.onclick=function(){mo.remove();};
  mf.appendChild(btnC);div.appendChild(mf);mo.appendChild(div);
  document.body.appendChild(mo);
}

function vincularParcial(cn,idx,gastoId){
  var p=proy.find(function(x){return x.id===cur;});if(!p)return;
  if(!p.catsCotiz||!p.catsCotiz[cn]||!p.catsCotiz[cn][idx])return;
  var item=p.catsCotiz[cn][idx];
  var g=gastos.find(function(x){return x.id===gastoId;});if(!g)return;
  if(!item.gastosParciales)item.gastosParciales=[];
  item.gastosParciales.push({
    id:g.id,correlativo:g.correlativo,descripcion:g.descripcion,
    proveedor:g.proveedor,valor:g.valor,fecha:g.fecha,factura:g.factura
  });
  document.querySelectorAll('.mo.open').forEach(function(m){m.remove();});
  autoSave();refreshPF();updateStatCards();
  toast('✓ Pago parcial agregado: $'+fmt(parseFloat(g.valor||0)));
}

function delCotizItem(cn,idx){
  var p=proy.find(function(x){return x.id===cur;});if(!p||!p.catsCotiz[cn])return;
  p.catsCotiz[cn].splice(idx,1);autoSave();refreshPF();
}
function updCotizItem(cn,idx,field,val){
  var p=proy.find(function(x){return x.id===cur;});if(!p||!p.catsCotiz||!p.catsCotiz[cn])return;
  p.catsCotiz[cn][idx][field]=val;autoSave();updateStatCards();
}
function upCotizItem(cn,idx){
  var p=proy.find(function(x){return x.id===cur;});if(!p)return;
  simUp(cn+idx,cn,function(nombre){
    if(!p.catsCotiz)p.catsCotiz={};
    if(!p.catsCotiz[cn])p.catsCotiz[cn]=[];
    p.catsCotiz[cn][idx].doc=nombre;autoSave();refreshPF();
  });
}
function addCustomCat(){
  var nombre=prompt('Nombre de la nueva categoría:');
  if(!nombre||!nombre.trim())return;
  var p=proy.find(function(x){return x.id===cur;});if(!p)return;
  if(!p.customCats)p.customCats=[];
  if(!p.catsCotiz)p.catsCotiz={};
  p.customCats.push(nombre.trim());
  p.catsCotiz[nombre.trim()]=[{id:'c0',monto:'',pagado:'',doc:'',nombre:'Cotización 1'}];
  autoSave();refreshPF();
}
function delCustomCat(cn){
  var p=proy.find(function(x){return x.id===cur;});if(!p)return;
  if(!confirm('¿Eliminar la categoría "'+cn+'" y todas sus cotizaciones?'))return;
  p.customCats=p.customCats.filter(function(x){return x!==cn;});
  delete p.catsCotiz[cn];autoSave();refreshPF();
}
function updateStatCards(){
  var p=proy.find(function(x){return x.id===cur;});if(!p)return;
  var tot=totCats(p),pag=pagCats(p);
  var e1=document.getElementById('stat-total');
  var e2=document.getElementById('stat-pagado');
  var e3=document.getElementById('stat-porpagar');
  if(e1)e1.textContent='$'+fmt(tot);
  if(e2)e2.textContent='$'+fmt(pag);
  if(e3)e3.textContent='$'+fmt(tot-pag);
  var ocM=p.cats&&p.cats['Obra civil']?parseFloat(p.cats['Obra civil'].monto||0):0;
  var gt=document.getElementById('gt-oc');
  var go=document.getElementById('gt-otras');
  if(gt)gt.textContent='$'+fmt(ocM);
  if(go)go.textContent='$'+fmt(tot-ocM);
  renderSB();
}

// LOGIN
var loginState={user:null,pinInput:'',attempts:0,blocked:false};

function renderLoginScreen(){
  if(!config.usuarios||config.usuarios.length===0){
    config.usuarios=[{nombre:'Admin',pin:'1234',rol:'admin'},{nombre:'Compañero',pin:'5678',rol:'viewer'}];
  }
  var ul=document.getElementById('login-user-list');
  if(!ul)return;
  ul.innerHTML=config.usuarios.map(function(u,i){
    return'<button class="login-user-btn'+(loginState.user===i?' selected':'')+'" onclick="selectUser('+i+')">'+
      '<span style="width:32px;height:32px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0">'+u.nombre[0].toUpperCase()+'</span>'+
      '<span>'+u.nombre+'</span>'+
      (loginState.user===i?'<span style="margin-left:auto;color:var(--accent)">✓</span>':'')+
    '</button>';
  }).join('');
  renderPinDots();
}

function selectUser(idx){loginState.user=idx;loginState.pinInput='';document.getElementById('login-error').textContent='';renderLoginScreen();}

function renderPinDots(){
  var len=loginState.pinInput.length;
  var maxPin=loginState.user!==null?(config.usuarios[loginState.user].pin.length||4):4;
  var el=document.getElementById('login-pin-dots');
  if(!el)return;
  el.innerHTML=Array.from({length:maxPin},function(_,i){return'<div class="pin-dot'+(i<len?' filled':'')+'"></div>';}).join('');
}

function pinKey(k){
  if(loginState.blocked)return;
  if(loginState.user===null){document.getElementById('login-error').textContent='Seleccioná un usuario primero';return;}
  if(k==='⌫'){loginState.pinInput=loginState.pinInput.slice(0,-1);renderPinDots();return;}
  if(k==='')return;
  var maxPin=config.usuarios[loginState.user].pin.length||4;
  if(loginState.pinInput.length>=maxPin)return;
  loginState.pinInput+=k;
  renderPinDots();
  if(loginState.pinInput.length===maxPin)checkPin();
}

function checkPin(){
  var u=config.usuarios[loginState.user];
  if(loginState.pinInput===u.pin){
    var sesionData={usuario:u.nombre,rol:u.rol,expira:Date.now()+(8*60*60*1000)};
    localStorage.setItem('fiq_sesion',JSON.stringify(sesionData));
    document.getElementById('login-screen').style.display='none';
    loginState={user:null,pinInput:'',attempts:0,blocked:false};
    toast('¡Bienvenido, '+u.nombre+'!');
  } else {
    loginState.attempts++;
    loginState.pinInput='';
    renderPinDots();
    if(loginState.attempts>=3){
      loginState.blocked=true;
      var secs=30;
      var blk=document.getElementById('login-block');
      document.getElementById('login-error').textContent='';
      blk.style.display='block';
      var interval=setInterval(function(){
        secs--;blk.textContent='⏱ Bloqueado por '+secs+' segundos...';
        if(secs<=0){clearInterval(interval);loginState.blocked=false;loginState.attempts=0;blk.style.display='none';}
      },1000);
    } else {
      document.getElementById('login-error').textContent='PIN incorrecto — '+loginState.attempts+'/3 intentos';
    }
  }
}

function cerrarSesion(){
  localStorage.removeItem('fiq_sesion');
  document.getElementById('login-screen').style.display='flex';
  loginState={user:null,pinInput:'',attempts:0,blocked:false};
  renderLoginScreen();
}

function checkSesion(){
  var s=localStorage.getItem('fiq_sesion');
  if(!s)return false;
  try{var p=JSON.parse(s);if(p.expira>Date.now())return true;}catch(e){}
  return false;
}

// INIT
(function init(){
  setSS('sy','Cargando...');
  renderLoginScreen();
  if(checkSesion()){
    document.getElementById('login-screen').style.display='none';
  }
  // Use JSONP for init load
  var cbInit='cbInit_'+Date.now();
  window[cbInit]=function(j){
    delete window[cbInit];
    if(document.getElementById(cbInit))document.getElementById(cbInit).remove();
    var datos=parseDatos(j&&j.data?j.data:'');
    if(datos){
      proy=datos;
      localStorage.setItem('fiq_v4',JSON.stringify({proy:proy,config:config}));
      setSS('ok','Sincronizado con Sheets');
      renderLoginScreen();render();
    } else {
      usarLocal();
    }
  };
  var si=document.createElement('script');
  si.id=cbInit;
  si.onerror=function(){delete window[cbInit];si.remove();usarLocal();};
  si.src=WEB_APP_URL+'?action=last&callback='+cbInit+'&t='+Date.now();
  document.head.appendChild(si);
  setTimeout(function(){if(window[cbInit]){delete window[cbInit];usarLocal();}},8000);
})();
</script>
